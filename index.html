<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XecLabs</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;color:#111;line-height:1.6;background:#fff;scroll-behavior:smooth}
.container{max-width:1150px;margin:auto;padding:0 24px}

/* LOGO */
.logo-x{
height:26px;
margin-right:10px;
vertical-align:middle;
}

.hero-x{
height:54px;
margin-right:14px;
vertical-align:middle;
}

/* NAV */
.nav{background:#020617;position:sticky;top:0;z-index:100}
.nav-inner{display:flex;justify-content:space-between;align-items:center;height:64px}
.brand-text{font-weight:700;font-size:1.1rem;display:flex;align-items:center}
.xec{color:#fff}.labs{color:#3aa0ff}
.nav-links{list-style:none;display:flex;gap:24px}
.nav-links a{color:#cbd5f5;text-decoration:none}
.nav-cta{background:#2563eb;padding:8px 16px;border-radius:6px;color:#fff}

/* HERO */
.hero{position:relative;background:linear-gradient(135deg,#0f172a,#020617);color:#fff;padding:140px 0;text-align:center;overflow:hidden}
#bg-canvas{position:absolute;inset:0;z-index:0}
.hero-title{font-size:3.6rem;display:flex;justify-content:center;align-items:center}
.subtitle{max-width:700px;margin:16px auto;opacity:.85}
.cta{display:inline-block;margin-top:28px;padding:14px 28px;background:#2563eb;color:#fff;text-decoration:none;border-radius:6px}

/* SECTIONS */
.section{padding:120px 0}
.section.light{background:#f8fafc}
h2{font-size:2.4rem;margin-bottom:40px}

/* WHO */
.who-wrapper{display:grid;grid-template-columns:1.2fr 1fr;gap:80px;align-items:center}
.who-accent{width:60px;height:4px;background:linear-gradient(90deg,#3aa0ff,#7c3aed);margin-bottom:30px;border-radius:4px}
.who-lead{font-size:1.4rem;font-weight:600;margin-bottom:24px}
.who-left p{margin-bottom:16px;opacity:.85}
.who-feature{
padding:28px;border-radius:16px;
background:linear-gradient(145deg,#ffffff,#f1f5f9);
box-shadow:0 12px 35px rgba(0,0,0,.06);
transition:.3s;margin-bottom:20px}
.who-feature:hover{
transform:translateY(-6px);
box-shadow:0 18px 45px rgba(0,0,0,.1)}
.who-feature h4{
margin-bottom:10px;
background:linear-gradient(90deg,#3aa0ff,#7c3aed);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent}

/* IMPACT */
.impact{background:radial-gradient(circle at top left,#111827,#020617 70%);color:#fff}
.impact-frame{border:1px solid rgba(255,255,255,.08);padding:90px 60px;border-radius:20px;background:rgba(255,255,255,.03)}
.impact-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:60px;text-align:center}
.impact-number{
font-size:3.8rem;font-weight:700;
background:linear-gradient(90deg,#3aa0ff,#7c3aed);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
margin-bottom:12px}

/* PROJECTS */
.project-company{margin-top:100px}
.company-header img{max-height:70px;margin-bottom:20px}
.company-description{opacity:.7;margin-bottom:50px}
.project-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:28px}
.project-card{
padding:28px;border-radius:18px;
background:linear-gradient(145deg,#ffffff,#f1f5f9);
box-shadow:0 15px 40px rgba(0,0,0,.06);
transition:.3s}
.project-card:hover{
transform:translateY(-8px);
box-shadow:0 20px 50px rgba(0,0,0,.1)}
.project-card h4{
margin-bottom:14px;
background:linear-gradient(90deg,#3aa0ff,#7c3aed);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent}
.project-card p{font-size:.9rem;opacity:.85;margin-bottom:10px}
.kpi-badges{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.kpi-badges span{
padding:6px 12px;font-size:.75rem;border-radius:20px;
background:rgba(58,160,255,.08);
border:1px solid rgba(58,160,255,.3)}

footer{text-align:center;padding:40px;color:#666}

@media(max-width:900px){
.who-wrapper{grid-template-columns:1fr}
.hero-title{font-size:2.6rem}
}

/* TEST BANNER */
.test-banner{
position:fixed;
top:0;
left:0;
width:100%;
background:#ef4444;
color:white;
text-align:center;
padding:6px;
font-weight:bold;
z-index:9999;
font-size:14px;
}

body{
margin-top:34px;
}
</style>
</head>

<body>

<div class="test-banner">TEST VERSION</div>

<nav class="nav">
<div class="container nav-inner">

<div class="brand-text">
<img src="x-logo.png" class="logo-x" alt="XecLabs">
<span class="xec">Xec</span><span class="labs">Labs</span>
</div>

<ul class="nav-links">
<li><a href="#who">Who We Are</a></li>
<li><a href="#impact">Impact</a></li>
<li><a href="#projects">Projects</a></li>
<li><a href="#contact" class="nav-cta">Contact</a></li>
</ul>

</div>
</nav>

<header class="hero">
<canvas id="bg-canvas"></canvas>

<div class="container">

<h1 class="hero-title">
<img src="x-logo.png" class="hero-x" alt="XecLabs">
<span class="xec">Xec</span><span class="labs">Labs</span>
</h1>

<p class="subtitle">
Business process transformation powered by technology, automation and AI — executed with senior ownership.
</p>

<a href="#contact" class="cta">Contact</a>

</div>
</header>
